<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Ordbog</title>
    <style>
        :root {
            --oed-red: #7a1c1c;
            --text-dark: #222222;
            --text-muted: #555555;
            --bg-light: #fcfbf9;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            border-bottom: 3px double var(--oed-red);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: var(--oed-red);
            font-size: 2.5rem;
            margin: 0;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 40px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        /* OED Styling for Dictionary Entries */
        .entry {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .headword {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--oed-red);
        }

        .part-of-speech {
            font-style: italic;
            color: var(--text-muted);
            margin-left: 8px;
            font-size: 1.1rem;
        }

        .variants {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .variants .label {
            font-variant: small-caps;
        }

        .senses-list {
            margin-top: 12px;
            padding-left: 20px;
        }

        .sense-item {
            margin-bottom: 15px;
        }

        .definition {
            font-size: 1.1rem;
            display: inline;
        }

        .examples-list {
            display: block;
            margin-top: 5px;
            padding-left: 20px;
            border-left: 2px solid #eee;
        }

        .example-item {
            font-style: italic;
            color: #444;
        }

        .no-results {
            font-style: italic;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Dansk Ordbog</h1>
    </header>

    <input type="text" id="searchBar" class="search-box" placeholder="Søg efter et ord..." oninput="filterDictionary()">

    <main id="dictionaryEntries">
        </main>
</div>

<script>
    // Your restructured OED-style data config
    const dictionaryData = [
        {
            "headword": "NU",
            "part_of_speech": "substantiv (hverdagssprog)",
            "variants": [],
            "senses": [
                {
                    "definition": "Et tidspunkt langt fra nuværende tidspunkt; et hypotetisk eller ubestemt tidspunkt i fremtiden, som reelt betegner noget, der ikke kommer til at ske.",
                    "examples": ["Det sker til NU."]
                }
            ]
        },
        {
            "headword": "bummelum",
            "part_of_speech": "substantiv / udråbsord (børnesprog)",
            "variants": [],
            "senses": [
                {
                    "definition": "Børnesprog for afføring eller det at have afføring.",
                    "examples": ["Han skal lave bummelum."]
                }
            ]
        },
        {
            "headword": "nummer 1",
            "part_of_speech": "fast udtryk",
            "variants": ["number 1"],
            "senses": [
                {
                    "definition": "Eufemisme for det at urinere; at lukke urin ud af kroppen.",
                    "examples": ["Jeg skal lige lave nummer 1."]
                }
            ]
        }
    ];

    function renderDictionary(data) {
        const container = document.getElementById('dictionaryEntries');
        container.innerHTML = '';

        if (data.length === 0) {
            container.innerHTML = '<p class="no-results">Ingen resultater fundet.</p>';
            return;
        }

        data.forEach(entry => {
            const entryDiv = document.createElement('div');
            entryDiv.className = 'entry';

            // Variant string generation
            let variantsHTML = '';
            if (entry.variants && entry.variants.length > 0) {
                variantsHTML = `<div class="variants"><span class="label">Også kaldet:</span> <b>${entry.variants.join(', ')}</b></div>`;
            }

            // Senses and examples mapping
            const sensesHTML = entry.senses.map((sense, index) => {
                const examplesHTML = sense.examples.map(ex => `<span class="example-item">— ${ex}</span>`).join('');
                return `
                    <div class="sense-item">
                        <span class="definition"><b>${index + 1}.</b> ${sense.definition}</span>
                        <div class="examples-list">${examplesHTML}</div>
                    </div>
                `;
            }).join('');

            entryDiv.innerHTML = `
                <div class="entry-header">
                    <span class="headword">${entry.headword}</span>
                    <span class="part-of-speech">${entry.part_of_speech}</span>
                </div>
                ${variantsHTML}
                <div class="senses-list">
                    ${sensesHTML}
                </div>
            `;

            container.appendChild(entryDiv);
        });
    }

    function filterDictionary() {
        const query = document.getElementById('searchBar').value.toLowerCase().trim();
        
        const filtered = dictionaryData.filter(entry => {
            const matchHeadword = entry.headword.toLowerCase().includes(query);
            const matchVariants = entry.variants.some(v => v.toLowerCase().includes(query));
            const matchDefinition = entry.senses.some(s => s.definition.toLowerCase().includes(query));
            
            return matchHeadword || matchVariants || matchDefinition;
        });

        renderDictionary(filtered);
    }

    // Initial print on load
    renderDictionary(dictionaryData);
</script>

</body>
</html>
