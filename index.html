<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoTV - Ordbog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="description" content="Den officiele MongoTV-ordbog.">
    <meta name="google-site-verification" content="774HfDz38bjYn3ah6h6kz5AwDGAhUz_0xxN7psTXIm8"/>
</head>
<body>
    <h1>Ordbog</h1>

    <div class="toggle-container">
        <button id="theme-toggle">Skift tema</button>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Søg efter ord eller variant...">
    </div>
    
    <div id="dictionary-container"></div>

    <script src="main.js"></script>

    <script>
        const container = document.getElementById('dictionary-container');
        const searchInput = document.getElementById('search-input');

        let dictionaryData = [];

        fetch('dictionary-definitions.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Kunne ikke hente JSON-filen: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                dictionaryData = data; // Store data globally
                displayEntries(dictionaryData); // Display all entries initially
            })
            .catch(error => {
                console.error('Fejl:', error);
                container.innerHTML = `<p style="color:red;">Der skete en fejl under indlæsning af ordbogen.</p>`;
            });

        function displayEntries(entries) {
            container.innerHTML = '';

            if (entries.length === 0) {
                container.innerHTML = '<p>Ingen resultater fundet.</p>';
                return;
            }

            entries.forEach(entry => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'dictionary-entry';

                const variantsText = entry.variants.length > 0 
                    ? `<div class="variants">Variant(er): ${entry.variants.join(', ')}</div>` 
                    : '';

                entryDiv.innerHTML = `
                    <h2 class="word">${entry.word}</h2>
                    ${variantsText}
                    <p class="definition">${entry.definition}</p>
                    <p class="example"><strong>Eksempel:</strong> ${entry.example}</p>
                `;

                container.appendChild(entryDiv);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();

            const filteredEntries = dictionaryData.filter(entry => {
                // Check if the word matches
                const matchesWord = entry.word.toLowerCase().includes(searchTerm);
                
                // Check if any of the variants match
                const matchesVariant = entry.variants.some(variant => 
                    variant.toLowerCase().includes(searchTerm)
                );

                // Return true if either the word OR a variant matches
                return matchesWord || matchesVariant;
            });

            displayEntries(filteredEntries);
        });
    </script>
</body>
</html>
